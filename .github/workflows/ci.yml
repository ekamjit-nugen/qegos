name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Typecheck is the load-bearing gate. `npm run build` walks the
      # project-reference graph and emits dist/ for every package + app;
      # a type error anywhere in the monorepo fails the job.
      - name: Build (typecheck + emit)
        run: npm run build

      - name: Test
        run: npm test -- --ci --runInBand
        env:
          # Jest suites that wire up BullMQ/Mongoose don't need a real
          # backend; harmless defaults keep them from probing localhost.
          NODE_ENV: test

  style:
    # Hard gate as of the no-explicit-any sweep. `npm run lint` is at 0
    # errors, 33 warnings (all `explicit-function-return-type` in places
    # where the return type is obvious — left as warnings, not errors).
    # Prettier is fully green. Conventions documented in CLAUDE.md:
    #   - `Model<any>` at DI boundaries gets the canonical disable
    #     comment ("Mongoose Model<T> invariance; app passes Model<IFoo>").
    #   - Tests are exempt from `no-var-requires` / `no-explicit-any` /
    #     `explicit-function-return-type` via .eslintrc override.
    #   - Provider files (lazy `require()` for optional deps) exempt from
    #     `no-var-requires` / `no-require-imports`.
    # If lint regresses on a PR, fix the rule violation in the diff —
    # don't reach for a new disable directive without justifying it.
    name: Style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
